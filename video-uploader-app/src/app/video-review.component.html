<div class="video-stage" #videoStage>
  <div class="video-wrapper" #videoWrapper>
    <video #videoEl
      [src]="videoUrl"
      [style.transform]="videoTransform"
      [class.zoomed]="isZoomed"
      (play)="onPlay()" (pause)="onPause()"
      (timeupdate)="onTimeUpdate()" (loadedmetadata)="onLoadedMetadata()"
      (click)="togglePlay()">
    </video>
    <canvas #canvasEl class="draw-canvas" [class.draw-active]="isDrawMode"
      (pointerdown)="onPointerDown($event)" (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp()" (pointerleave)="onPointerUp()">
    </canvas>
    <div class="zoom-overlay" *ngIf="isZoomMode"
         (pointerdown)="onZoomPointerDown($event)" (pointermove)="onZoomPointerMove($event)"
         (pointerleave)="onZoomPointerLeave()">
      <div class="zoom-selection-rect" *ngIf="zoomSelectionActive && zoomSelectionCenter"
           [style.left.px]="zoomSelectionLeft"
           [style.top.px]="zoomSelectionTop"
           [style.width.px]="activeZoomBoxSize"
           [style.height.px]="activeZoomBoxSize"></div>
    </div>
  </div>

  <div class="controls-bar" #controlsBar [class.is-fullscreen]="isFullscreen">
    <div class="controls-left">
      <button class="player-btn" (click)="togglePlay()">{{ isPlaying ? '&#10074;&#10074;' : '&#9654;' }}</button>
      <button class="player-btn icon-button" (click)="stepFrame(-1)" title="Previous frame" aria-label="Previous frame">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/>
        </svg>
      </button>
      <button class="player-btn icon-button" (click)="stepFrame(1)" title="Next frame" aria-label="Next frame">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>

      <div class="volume-control" (mouseenter)="showVolumeSlider = true" (mouseleave)="showVolumeSlider = false">
        <button class="player-btn icon-button volume-button" type="button" (click)="toggleMute($event)" (mouseenter)="showVolumeSlider = true" [attr.aria-label]="isMuted ? 'Unmute video' : 'Mute video'" title="Volume">
          <ng-container *ngIf="isMuted; else volumeIcon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              <path d="M18 8l6 8"/>
              <path d="M24 8l-6 8"/>
            </svg>
          </ng-container>
          <ng-template #volumeIcon>
            <svg *ngIf="volume > 0.6; else lowVolume" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/>
            </svg>
            <ng-template #lowVolume>
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/>
                <path d="M13 6.5v11.1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </ng-template>
          </ng-template>
        </button>
        <div class="volume-slider" *ngIf="showVolumeSlider">
          <input type="range" min="0" max="1" step="0.01" [value]="volume" (input)="setVolume(+($any($event.target).value))" aria-label="Volume slider" />
        </div>
      </div>

      <div class="zoom-control-wrapper">
        <button class="player-btn icon-button" type="button" (click)="toggleZoomMode($event)" [class.active]="isZoomMode || showZoomPresetMenu" aria-label="Choose zoom preset" title="Zoom">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C8.01 14 6 11.99 6 9.5S8.01 5 10.5 5 15 7.01 15 9.5 12.99 14 10.5 14z"/>
          </svg>
        </button>
        <div class="zoom-preset-menu" *ngIf="showZoomPresetMenu">
          <button class="player-btn zoom-preset-btn" type="button" (click)="selectZoomPreset(3.5, $event)">3.5x</button>
          <button class="player-btn zoom-preset-btn" type="button" (click)="selectZoomPreset(3, $event)">3x</button>
          <button class="player-btn zoom-preset-btn" type="button" (click)="selectZoomPreset(2, $event)">2x</button>
        </div>
        <button class="player-btn reset-zoom-btn" *ngIf="isZoomed" type="button" (click)="resetZoom($event)" title="Reset zoom" aria-label="Reset zoom">
          Reset
        </button>
      </div>

      <div class="seek-wrapper">
        <input type="range" min="0" [max]="duration" step="0.01"
               [value]="currentTime" (input)="onSeekBarInput($event)" />
        <div class="flag-marks">
          <span *ngFor="let flag of flags" class="flag-mark"
                [style.left.%]="flagPosition(flag.timestamp)"></span>
        </div>
      </div>

      <span class="time-label">{{ formatTime(currentTime) }} / {{ formatTime(duration) }}</span>

      <select class="player-btn speed-select" [ngModel]="playbackRate" (ngModelChange)="setPlaybackRate($event)">
        <option [ngValue]="0.25">0.25x</option>
        <option [ngValue]="0.5">0.5x</option>
        <option [ngValue]="1">1x</option>
        <option [ngValue]="1.5">1.5x</option>
        <option [ngValue]="2">2x</option>
      </select>

      <div class="draw-controls-wrapper">
        <div class="draw-toolbar-row" *ngIf="isToolbarOpen">
          <button class="player-btn draw-action-btn" type="button" (click)="undo($event)" [disabled]="strokes.length === 0" aria-label="Undo draw action">Undo</button>
          <button class="player-btn draw-action-btn" type="button" (click)="redo($event)" [disabled]="redoStack.length === 0" aria-label="Redo draw action">Redo</button>
          <button class="player-btn draw-action-btn" type="button" (click)="clearDrawing($event)" aria-label="Clear drawing">Clear</button>

          <div class="symbol-trigger">
            <button class="player-btn draw-action-btn" type="button" (click)="toggleSymbolsMenu($event)" [class.active]="isSymbolPopupOpen" [attr.aria-expanded]="isSymbolPopupOpen" aria-label="Open shape picker">Symbol</button>
            <div class="symbol-popup" *ngIf="isSymbolPopupOpen">
              <button class="shape-btn" type="button" (click)="selectTool('pen', $event)" [class.selected]="currentTool === 'pen'" title="Pencil" aria-label="Pencil tool">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l4-1 10-10-3-3-10 10-1 4z"/></svg>
              </button>
              <button class="shape-btn" type="button" (click)="selectTool('circle', $event)" [class.selected]="currentTool === 'circle'" title="Circle" aria-label="Circle tool">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="7"/></svg>
              </button>
              <button class="shape-btn" type="button" (click)="selectTool('arrow', $event)" [class.selected]="currentTool === 'arrow'" title="Arrow" aria-label="Arrow tool">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l16-16"/><path d="M10 4h10v10"/></svg>
              </button>
              <button class="shape-btn" type="button" (click)="selectTool('square', $event)" [class.selected]="currentTool === 'square'" title="Square" aria-label="Square tool">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="5" width="14" height="14" rx="1"/></svg>
              </button>
            </div>
          </div>
        </div>

        <button class="player-btn draw-toggle-btn" type="button" (click)="toggleDrawMenu($event)" [class.active]="isToolbarOpen" [attr.aria-expanded]="isToolbarOpen" aria-label="Toggle drawing tools">DRAW</button>
      </div>

      <button class="player-btn" type="button" (click)="addFlag($event)" title="Flag this timestamp">Flag</button>
    </div>

    <div class="controls-right">
      <button *ngIf="isFullscreen" class="player-btn icon-button" (click)="toggleFullscreenNotes($event)" [class.active]="isFullscreenNotesOpen" title="Notes" aria-label="Toggle notes panel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M3 3h18v18H3V3zm2 2v14h14V5H5zm3 3h8v2H8V8zm0 4h8v2H8v-2z"/>
        </svg>
      </button>
      <button class="player-btn icon-button fullscreen-button" (click)="toggleFullscreen()"
              [attr.aria-label]="isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen'">
        <svg *ngIf="!isFullscreen" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        <svg *ngIf="isFullscreen" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
      </button>
    </div>
  </div>
  <aside class="fullscreen-notes-panel" *ngIf="isFullscreen" [class.open]="isFullscreenNotesOpen" (click)="$event.stopPropagation()">
    <div class="panel-header">
      <h4>Notes & Flags</h4>
      <button class="player-btn icon-button" (click)="toggleFullscreenNotes($event)" title="Close panel" aria-label="Close notes">✕</button>
    </div>
    <div class="note-input panel-note-input">
      <input type="text" [(ngModel)]="newNoteText" placeholder="Add a note for current time..." (keyup.enter)="addNote($event)" />
      <button type="button" (click)="addNote($event)">Save</button>
    </div>
    <div class="annotation-feedback" *ngIf="lastAnnotationMessage">{{ lastAnnotationMessage }}</div>
    <ul class="item-list panel-item-list">
      <li *ngFor="let ann of annotationItems">
        <button class="timestamp-jump" type="button" (click)="seekTo(ann.timestamp)">{{ formatTime(ann.timestamp) }}</button>
        <span>{{ ann.text || 'Flag' }}</span>
        <button class="remove-item" *ngIf="ann.text" type="button" (click)="removeNote(ann.id)">&#10005;</button>
        <button class="remove-item" *ngIf="!ann.text" type="button" (click)="removeFlag(ann.id)">&#10005;</button>
      </li>
    </ul>
  </aside>
</div>

<div class="side-panels">
  <div class="notes-panel">
    <h4>Notes</h4>
    <div class="note-input">
      <input type="text" [(ngModel)]="newNoteText" placeholder="Add a note..." (keyup.enter)="addNote($event)" />
      <button type="button" (click)="addNote($event)">Add</button>
    </div>
    <ul class="item-list">
      <li *ngFor="let ann of annotationItems">
        <button class="timestamp-jump" type="button" (click)="seekTo(ann.timestamp)">{{ formatTime(ann.timestamp) }}</button>
        <span>{{ ann.text || 'Flag' }}</span>
        <button class="remove-item" *ngIf="ann.text" type="button" (click)="removeNote(ann.id)">&#10005;</button>
        <button class="remove-item" *ngIf="!ann.text" type="button" (click)="removeFlag(ann.id)">&#10005;</button>
      </li>
    </ul>
  </div>

  <div class="flags-panel">
    <h4>Flags</h4>
    <ul class="item-list">
      <li *ngFor="let flag of flags">
        <button class="timestamp-jump" (click)="seekTo(flag.timestamp)">{{ formatTime(flag.timestamp) }}</button>
        <button class="remove-item" (click)="removeFlag(flag.id)">&#10005;</button>
      </li>
    </ul>
  </div>
</div>
